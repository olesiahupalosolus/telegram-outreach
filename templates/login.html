<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вхід — Telegram Outreach</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #2b5ce6 0%, #1a3fa0 100%); color: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

  .auth-card { background: white; border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }

  .brand { text-align: center; margin-bottom: 28px; }
  .brand-icon { font-size: 44px; margin-bottom: 8px; }
  .brand h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .brand p { font-size: 13px; color: #888; }

  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #555; }
  input { width: 100%; padding: 12px 14px; border: 1.5px solid #e0e4ee; border-radius: 10px; font-size: 14px; outline: none; transition: border 0.2s; background: #fafbff; }
  input:focus { border-color: #2b5ce6; background: white; }
  .form-group { margin-bottom: 16px; }

  .btn { display: block; width: 100%; padding: 13px 22px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: #2b5ce6; color: white; margin-top: 8px; }
  .btn:hover { background: #1a3fa0; transform: translateY(-1px); }

  .alert { padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; }
  .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
  .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
  .alert-info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

  .auth-footer { text-align: center; margin-top: 22px; font-size: 13px; color: #888; }
  .auth-footer a { color: #2b5ce6; text-decoration: none; font-weight: 600; }
  .auth-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="auth-card">
  <div class="brand">
    <div class="brand-icon">✈️</div>
    <h1>Telegram Outreach</h1>
    <p>Увійдіть, щоб продовжити</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ 'error' if category == 'error' else ('success' if category == 'success' else 'info') }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('login') }}">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" value="{{ email or '' }}" required autofocus>
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn">Увійти</button>
  </form>

  <div class="auth-footer">
    Немає акаунту? <a href="{{ url_for('register') }}">Зареєструватися</a>
  </div>
</div>

</body>
</html>
